worker_processes auto;
events { worker_connections 1024; }

http {
  upstream lumisign_web { server web:3000; }
  upstream lumisign_api { server server:4000; }

  # WebSocket / Socket.IO upgrade mapping
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name _;

    # Dashboard (Next.js)
    location / {
      proxy_pass http://lumisign_web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API + Realtime + Player are served by the backend
    location /api/ {
      proxy_pass http://lumisign_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /socket.io/ {
      proxy_pass http://lumisign_api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
    }

    location /player/ {
      proxy_pass http://lumisign_api;
      proxy_http_version 1.1;
    }

    location /api-docs/ {
      proxy_pass http://lumisign_api;
    }
  }
}
