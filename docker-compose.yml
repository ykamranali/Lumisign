version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: lumisign-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-lumisign}
      POSTGRES_USER: ${DB_USER:-lumisign}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_strong_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lumisign} -d ${DB_NAME:-lumisign}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lumisign-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: lumisign-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  server:
    build:
      context: ./server
    container_name: lumisign-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-lumisign}
      DB_USER: ${DB_USER:-lumisign}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_strong_password}
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_me}
      JWT_EXPIRES_IN: 12h
      BCRYPT_ROUNDS: 12
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      MEDIA_ROOT: /app/storage/media
      THUMBS_ROOT: /app/storage/thumbs
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: lumisign
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@lumisign.io}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin@12345}
    ports:
      - "4000:4000"
    volumes:
      - server_media:/app/storage/media
      - server_thumbs:/app/storage/thumbs

  web:
    build:
      context: ./web
    container_name: lumisign-web
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: lumisign-nginx
    restart: unless-stopped
    depends_on:
      - server
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pgdata:
  miniodata:
  server_media:
  server_thumbs:
